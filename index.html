<!DOCTYPE html>
<html>
<head>
<title>Repair Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.container{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:space-between;
}

.card{
background:white;
border-radius:8px;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.form-card{
width:100%;
}

.chart-card{
width:300px;
height:200px;
}

.chart-card canvas{
width:100% !important;
height:100% !important;
}

input,select{
padding:6px;
margin:4px;
}

button{
padding:6px 12px;
background:#3f51b5;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#3f51b5;
color:white;
}

.tabs button{
background:#ddd;
color:black;
margin-right:5px;
}

.tabs button.active{
background:#3f51b5;
color:white;
}

.filters{
margin-top:10px;
}

</style>
</head>

<body>

<h1>Repair Dashboard</h1>

<div class="card form-card">

Date
<input type="date" id="date">

Name
<select id="name">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

Repaired By
<select id="repaired">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

QC By
<select id="qc">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

Work Done By
<select id="work">
<option>Repair</option>
<option>Testing</option>
<option>Assembly</option>
</select>

Checked By
<select id="checked">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

Remarks
<input type="text" id="remarks">

<button onclick="addData()">Add</button>

</div>

<br>

<div class="container">

<div class="card chart-card">
<canvas id="nameChart"></canvas>
</div>

<div class="card chart-card">
<canvas id="repairChart"></canvas>
</div>

<div class="card chart-card">
<canvas id="workChart"></canvas>
</div>

</div>

<div class="filters">

Filter Date
<input type="date" id="filterDate" onchange="loadData()">

Filter Name
<select id="filterName" onchange="loadData()">
<option value="">All</option>
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

</div>

<br>

<div class="tabs">
<button class="active">All</button>
<button>Repaired By</button>
<button>QC By</button>
<button>Work Done By</button>
</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Repaired By</th>
<th>QC By</th>
<th>Work</th>
<th>Checked By</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

let data = JSON.parse(localStorage.getItem("repairData")) || []

function addData(){

let record={
date:document.getElementById("date").value,
name:document.getElementById("name").value,
repaired:document.getElementById("repaired").value,
qc:document.getElementById("qc").value,
work:document.getElementById("work").value,
checked:document.getElementById("checked").value,
remarks:document.getElementById("remarks").value
}

data.push(record)

localStorage.setItem("repairData",JSON.stringify(data))

loadData()
updateCharts()

}

function loadData(){

let tbody=document.getElementById("tableBody")
tbody.innerHTML=""

let fDate=document.getElementById("filterDate").value
let fName=document.getElementById("filterName").value

data.forEach(d=>{

if(fDate && d.date!=fDate) return
if(fName && d.name!=fName) return

let row=`
<tr>
<td>${d.date}</td>
<td>${d.name}</td>
<td>${d.repaired}</td>
<td>${d.qc}</td>
<td>${d.work}</td>
<td>${d.checked}</td>
<td>${d.remarks}</td>
</tr>
`

tbody.innerHTML+=row

})

}

function countBy(field){

let counts={}

data.forEach(d=>{
counts[d[field]]=(counts[d[field]]||0)+1
})

return counts

}

function updateCharts(){

updateChart(nameChart,countBy("name"))
updateChart(repairChart,countBy("repaired"))
updateChart(workChart,countBy("work"))

}

function updateChart(chart,counts){

chart.data.labels=Object.keys(counts)
chart.data.datasets[0].data=Object.values(counts)
chart.update()

}

function createChart(id,label){

return new Chart(document.getElementById(id),{
type:"bar",
data:{
labels:[],
datasets:[{
label:label,
data:[],
backgroundColor:["#ff6384","#36a2eb","#ffce56","#4caf50","#9c27b0"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})

}

let nameChart=createChart("nameChart","Work By Name")
let repairChart=createChart("repairChart","Repaired By")
let workChart=createChart("workChart","Work Type")

loadData()
updateCharts()

</script>

</body>
</html>
