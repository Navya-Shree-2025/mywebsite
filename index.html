<!DOCTYPE html>
<html>
<head>
<title>Project Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f6ff;
margin:40px;
}

h2{
color:#333;
}

.container{
display:flex;
gap:40px;
}

.chartbox{
width:350px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px #ccc;
}

input,select,button{
padding:8px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
background:white;
}

th{
background:#4CAF50;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<h2>Project Status Dashboard</h2>

<h3>Add Record</h3>

<input type="date" id="date">

<select id="type">
<option>LPU</option>
<option>Green PCB</option>
<option>Camera</option>
<option>IC Card</option>
<option>Dashboard</option>
<option>Display</option>
</select>

<input type="text" id="serial" placeholder="Serial No">

<select id="status">
<option>Working</option>
<option>Not Working</option>
<option>In Progress</option>
</select>

<select id="name">
<option>Navya</option>
<option>Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

<input type="text" id="remarks" placeholder="Remarks">

<button onclick="addRecord()">Add</button>

<hr>

<div class="container">

<div class="chartbox">
<canvas id="typeChart"></canvas>
</div>

<div class="chartbox">
<canvas id="statusChart"></canvas>
</div>

</div>

<h3>Records</h3>

<table id="table">
<tr>
<th>Date</th>
<th>Type</th>
<th>Serial</th>
<th>Status</th>
<th>Checked By</th>
<th>Remarks</th>
</tr>
</table>

<script>

function getData(){
return JSON.parse(localStorage.getItem("records")||"[]")
}

function saveData(data){
localStorage.setItem("records",JSON.stringify(data))
}

function addRecord(){

let data=getData()

let record={
date:date.value,
type:type.value,
serial:serial.value,
status:status.value,
name:name.value,
remarks:remarks.value
}

data.push(record)

saveData(data)

loadTable()
drawCharts()

}

function loadTable(){

let data=getData()

let table=document.getElementById("table")

table.innerHTML=`<tr>
<th>Date</th>
<th>Type</th>
<th>Serial</th>
<th>Status</th>
<th>Checked By</th>
<th>Remarks</th>
</tr>`

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.date}</td>
<td>${r.type}</td>
<td>${r.serial}</td>
<td>${r.status}</td>
<td>${r.name}</td>
<td>${r.remarks}</td>
</tr>`

})

}

function drawCharts(){

let data=getData()

let typeCount={}
let statusCount={}

data.forEach(r=>{

typeCount[r.type]=(typeCount[r.type]||0)+1
statusCount[r.status]=(statusCount[r.status]||0)+1

})

new Chart(document.getElementById("typeChart"),{
type:'doughnut',
data:{
labels:Object.keys(typeCount),
datasets:[{
data:Object.values(typeCount)
}]
}
})

new Chart(document.getElementById("statusChart"),{
type:'pie',
data:{
labels:Object.keys(statusCount),
datasets:[{
data:Object.values(statusCount)
}]
}
})

}

loadTable()
drawCharts()

</script>

</body>
</html>
