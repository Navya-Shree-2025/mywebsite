<!DOCTYPE html>
<html>
<head>

<title>Repair Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.upload{
margin-bottom:20px;
text-align:center;
}

button{
padding:8px 15px;
background:#3f51b5;
color:white;
border:none;
cursor:pointer;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
width:280px;
height:180px;
}

.card canvas{
width:100% !important;
height:100% !important;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#3f51b5;
color:white;
}

</style>

</head>

<body>

<h1>Repair Dashboard</h1>

<div class="upload">

<input type="file" id="excelFile" accept=".xlsx,.xls">
<button onclick="uploadExcel()">Upload Excel</button>

</div>

<div class="container">

<div class="card">
<canvas id="statusChart"></canvas>
</div>

<div class="card">
<canvas id="deviceChart"></canvas>
</div>

<div class="card">
<canvas id="pcbChart"></canvas>
</div>

</div>

<table id="dataTable">

<thead>

<tr>
<th>S.no</th>
<th>Device S.No</th>
<th>Device Name</th>
<th>Repaired status</th>
<th>Details Description</th>
<th>Date of Repair</th>
<th>Type of PCB</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script>

let tableData=[]

function uploadExcel(){

let file=document.getElementById("excelFile").files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet)

tableData=rows

displayTable()

updateCharts()

}

reader.readAsArrayBuffer(file)

}

function displayTable(){

let body=document.querySelector("#dataTable tbody")

body.innerHTML=""

tableData.forEach(r=>{

let row=`
<tr>
<td>${r["S.no"]||""}</td>
<td>${r["Device S.No"]||""}</td>
<td>${r["Device Name"]||""}</td>
<td>${r["Repaired status"]||""}</td>
<td>${r["Details Description"]||""}</td>
<td>${r["Date of Repair"]||""}</td>
<td>${r["Type of PCB"]||""}</td>
</tr>
`

body.innerHTML+=row

})

}

function countBy(field){

let counts={}

tableData.forEach(d=>{

let key=d[field]||"Unknown"

counts[key]=(counts[key]||0)+1

})

return counts

}

function updateCharts(){

updateChart(statusChart,countBy("Repaired status"))

updateChart(deviceChart,countBy("Device Name"))

updateChart(pcbChart,countBy("Type of PCB"))

}

function updateChart(chart,data){

chart.data.labels=Object.keys(data)

chart.data.datasets[0].data=Object.values(data)

chart.update()

}

function createChart(id,label){

return new Chart(document.getElementById(id),{

type:"bar",

data:{
labels:[],
datasets:[{
label:label,
data:[],
backgroundColor:[
"#ff6384",
"#36a2eb",
"#ffce56",
"#4caf50",
"#9c27b0"
]
}]
},

options:{
responsive:true,
maintainAspectRatio:false
}

})

}

let statusChart=createChart("statusChart","Repair Status")

let deviceChart=createChart("deviceChart","Device Name")

let pcbChart=createChart("pcbChart","Type of PCB")

</script>

</body>
</html>
