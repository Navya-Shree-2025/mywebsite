<!DOCTYPE html>
<html>
<head>

<title>Device Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:20px;
}

h2{
margin-bottom:20px;
}

.dashboard{
display:grid;
grid-template-columns: 40% 60%;
grid-gap:20px;
}

.chartbox{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.tablebox{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
height:400px;
overflow:auto;
}

.filters{
margin-bottom:20px;
}

input,select{
padding:6px;
margin-right:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1976d2;
color:white;
padding:8px;
}

td{
padding:6px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<h2>Project Status Dashboard</h2>

<div class="filters">

Date  
<input type="date" id="dateFilter">

Checked By

<select id="nameFilter">
<option value="">All</option>
<option>Navya</option>
<option>Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

<button onclick="filterTable()">Filter</button>

</div>

<div class="dashboard">

<div class="chartbox">
<h3>Count of Status by Type of Item</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="tablebox">

<table id="dataTable">

<tr>
<th>Date</th>
<th>Serial</th>
<th>Type</th>
<th>Status</th>
<th>Checked By</th>
</tr>

<tr>
<td>2026-03-02</td>
<td>27513</td>
<td>Camera</td>
<td>Working</td>
<td>Navya</td>
</tr>

<tr>
<td>2026-03-02</td>
<td>27836</td>
<td>LPU</td>
<td>Not Working</td>
<td>Sravani</td>
</tr>

<tr>
<td>2026-03-02</td>
<td>87347</td>
<td>LPU</td>
<td>Not Working</td>
<td>Harshitha</td>
</tr>

</table>

</div>

</div>

<script>

new Chart(document.getElementById("pieChart"),{
type:"doughnut",
data:{
labels:["LPU","Green PCB","Camera","IC Card","Dashboard","Display"],
datasets:[{
data:[8,6,3,2,1,1],
backgroundColor:[
"#6a1b9a",
"#1e88e5",
"#fbc02d",
"#e53935",
"#ec407a",
"#9575cd"
]
}]
}
})

function filterTable(){

let date=document.getElementById("dateFilter").value
let name=document.getElementById("nameFilter").value

let rows=document.querySelectorAll("#dataTable tr")

rows.forEach((row,i)=>{

if(i==0)return

let rdate=row.cells[0].innerText
let rname=row.cells[4].innerText

row.style.display=
(!date||rdate==date)&&(!name||rname==name)
?"":"none"

})

}

</script>

</body>
</html>
