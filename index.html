<!DOCTYPE html>
<html>
<head>
<title>Repair Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
min-width:250px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#3f51b5;
color:white;
}

input,select,button{
padding:6px;
margin:4px;
}

button{
background:#3f51b5;
color:white;
border:none;
cursor:pointer;
}

.tabs button{
background:#eee;
color:black;
}

.tabs button.active{
background:#3f51b5;
color:white;
}
</style>
</head>

<body>

<h1>Repair Dashboard</h1>

<div class="container">

<div class="card">
<h3>Add Record</h3>

<input type="date" id="date">

<select id="name">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

<select id="repaired">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

<select id="qc">
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>

<select id="work">
<option>Repair</option>
<option>Testing</option>
<option>Assembly</option>
</select>

<input type="text" id="remarks" placeholder="Remarks">

<button onclick="addData()">Add</button>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<br>

<div>
Filter Date
<input type="date" id="filterDate" onchange="loadData()">

Filter Name
<select id="filterName" onchange="loadData()">
<option value="">All</option>
<option>Navya Shree</option>
<option>Sravani</option>
<option>Harshitha</option>
<option>Saniya</option>
<option>Sravya</option>
</select>
</div>

<br>

<div class="tabs">
<button onclick="showTab('all')" class="active">All</button>
<button onclick="showTab('repaired')">Repaired By</button>
<button onclick="showTab('qc')">QC By</button>
<button onclick="showTab('work')">Work Done By</button>
</div>

<table id="table">
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Repaired By</th>
<th>QC By</th>
<th>Work Done</th>
<th>Remarks</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("repairData")) || []

function addData(){

let record={
date:document.getElementById("date").value,
name:document.getElementById("name").value,
repaired:document.getElementById("repaired").value,
qc:document.getElementById("qc").value,
work:document.getElementById("work").value,
remarks:document.getElementById("remarks").value
}

data.push(record)

localStorage.setItem("repairData",JSON.stringify(data))

loadData()
updateChart()

}

function loadData(){

let tbody=document.querySelector("#table tbody")
tbody.innerHTML=""

let fDate=document.getElementById("filterDate").value
let fName=document.getElementById("filterName").value

data.forEach(d=>{

if(fDate && d.date!=fDate) return
if(fName && d.name!=fName) return

let row=`<tr>
<td>${d.date}</td>
<td>${d.name}</td>
<td>${d.repaired}</td>
<td>${d.qc}</td>
<td>${d.work}</td>
<td>${d.remarks}</td>
</tr>`

tbody.innerHTML+=row

})

}

function showTab(type){

document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")

}

function updateChart(){

let counts={}

data.forEach(d=>{
counts[d.name]=(counts[d.name]||0)+1
})

chart.data.labels=Object.keys(counts)
chart.data.datasets[0].data=Object.values(counts)
chart.update()

}

let ctx=document.getElementById("chart")

let chart=new Chart(ctx,{
type:"bar",
data:{
labels:[],
datasets:[{
label:"Work Count",
data:[],
backgroundColor:["#ff6384","#36a2eb","#ffce56","#4caf50","#9c27b0"]
}]
}
})

loadData()
updateChart()

</script>

</body>
</html>
